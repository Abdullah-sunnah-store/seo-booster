# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "7d6846fb9f944b6701f6cc35b77eab6f"
name = "Cracktab - COD"
handle = "cracktab-cod"
application_url = "http://localhost:3000/app"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_content,write_content,read_themes,write_themes,read_metaobjects,write_metaobjects,read_files,write_files,write_draft_orders,read_draft_orders,write_orders,read_orders"

[auth]
redirect_urls = [
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/shopify/callback",
  "http://localhost:3000/api/auth/callback"
]

[app_proxy]
url = "/cod"
subpath = "cod-checkout"
prefix = "apps"

[webhooks]
api_version = "2024-07"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
dev_store_url = ""
